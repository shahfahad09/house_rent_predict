<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {font-family: Arial; background:#f4f4f9; display:flex; justify-content:center; align-items:center; height:100vh;}
        .container {background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);}
        h2 {text-align:center; color:#333;}
        input {width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
        button {width:100%; padding:10px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer;}
        button:hover {background:#45a049;}
        p {text-align:center;}
        a {color:#4CAF50;}
        .flash {color:red; text-align:center;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <p class="flash">{{ message }}</p>
          {% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Email or Phone" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Signup</a></p>
    </div>
</body>
</html>
