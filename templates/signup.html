<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        p {
            text-align: center;
        }

        a {
            color: #4CAF50;
        }

        .flash {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Signup</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <p class="flash">{{ message }}</p>
        {% endfor %}
        {% endwith %}

        <form method="POST" onsubmit="return validateForm()">

            <input type="text" name="first_name" placeholder="First Name" required>

            <input type="text" name="last_name" placeholder="Last Name" required>

            <input type="email" name="email" placeholder="Email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                required>


            <div style="display:flex; align-items:center;">

                <span style="font-size:20px; margin-right:5px;">🇮🇳</span>


                <input type="text" value="+91" readonly style="width:60px; text-align:center; margin-right:5px;">


                <input type="text" name="phone" placeholder="Enter 10 digit Phone Number" pattern="[0-9]{10}"
                    maxlength="10" required style="flex:1;">
            </div>


            <input type="password" name="password" placeholder="Password"
       pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
       title="Password must be at least 8 characters, include uppercase, lowercase, number, and special character"
       required>


            <input type="date" name="dob" id="dob" required>

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>



            <button type="submit">Signup</button>
        </form>

        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>

        let today = new Date().toISOString().split("T")[0];
        document.getElementById("dob").setAttribute("max", today);

        function validateForm() {
            let phone = document.querySelector("input[name='phone']").value;

            if (phone.length !== 10) {
                alert("Phone number must be exactly 10 digits!");
                return false;
            }

            return true;
        }
    </script>

</body>

</html>
